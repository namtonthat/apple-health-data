version: 2

models:
  - name: fct_workout_sets
    description: >
      Fact table of individual workout sets with full context.
      Grain: One row per set performed.
    columns:
      - name: set_id
        description: Primary key
        tests:
          - not_null
          - unique
      - name: exercise_id
        description: Foreign key to the exercise
        tests:
          - not_null
      - name: workout_id
        description: Foreign key to the workout
        tests:
          - not_null
      - name: workout_date
        description: Date of workout
        tests:
          - not_null
      - name: exercise_name
        description: Name of exercise performed
        tests:
          - not_null
      - name: set_number
        description: Set number within the exercise
        tests:
          - not_null
      - name: set_type
        description: Type (normal, warmup, dropset, failure)
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['normal', 'warmup', 'dropset', 'failure']
      - name: weight_kg
        description: Weight lifted in kilograms
      - name: reps
        description: Number of repetitions
      - name: volume_kg
        description: Set volume (weight × reps)
      - name: rpe
        description: Rate of Perceived Exertion

  - name: fct_daily_summary
    description: >
      Combined daily health and fitness summary.
      Grain: One row per calendar day.
    columns:
      - name: date
        description: Calendar date
        tests:
          - not_null
          - unique
      - name: weight_kg
        description: Body weight in kg
      - name: resting_hr_bpm
        description: Resting heart rate in BPM
      - name: hrv_ms
        description: Heart rate variability in milliseconds
      - name: vo2_max
        description: VO2 max estimate
      - name: sleep_hours
        description: Total sleep duration
      - name: steps
        description: Daily step count
      - name: total_calories
        description: Total calories burned (active + basal)
      - name: workouts
        description: Number of workouts performed
      - name: total_volume_kg
        description: Total workout volume in kg
      - name: had_strength_workout
        description: Boolean flag for workout days
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

  - name: fct_e1rm_rolling_total
    description: >
      Rolling estimated 1RM total for Big 3 lifts (Squat, Bench, Deadlift).
      Uses Epley formula to estimate 1RM per set, tracks running max per lift,
      and sums for estimated powerlifting total.
      Grain: One row per Big 3 workout date.
    columns:
      - name: workout_date
        description: Date of workout
        tests:
          - not_null
          - unique
      - name: squat_e1rm
        description: Running max estimated 1RM for squat
        tests:
          - not_null
      - name: bench_e1rm
        description: Running max estimated 1RM for bench press
        tests:
          - not_null
      - name: deadlift_e1rm
        description: Running max estimated 1RM for deadlift
        tests:
          - not_null
      - name: estimated_total
        description: Sum of squat + bench + deadlift e1RMs
        tests:
          - not_null

  - name: fct_weight_rolling_averages
    description: >
      Rolling weight averages at 7/14/30/60/120-day windows.
      Grain: One row per date with a weight reading.
    columns:
      - name: date
        description: Calendar date
        tests:
          - not_null
          - unique
      - name: weight_kg
        description: Body weight in kg
        tests:
          - not_null
      - name: avg_7d
        description: 7-day rolling average weight
      - name: avg_14d
        description: 14-day rolling average weight
      - name: avg_30d
        description: 30-day rolling average weight
      - name: avg_60d
        description: 60-day rolling average weight
      - name: avg_120d
        description: 120-day rolling average weight

  - name: fct_training_readiness
    description: >
      Composite training readiness score (0-100) based on HRV, RHR, sleep, and deep sleep.
      Each component scores 0-25 using z-score normalization against 30-day rolling baseline.
      Grain: One row per date with at least one cardiovascular/sleep metric.
    columns:
      - name: date
        description: Date of the readiness score
        tests:
          - not_null
          - unique
      - name: readiness_score
        description: Composite readiness score
        tests:
          - not_null
      - name: hrv_score
        description: HRV component score
      - name: rhr_score
        description: Resting heart rate component score
      - name: sleep_score
        description: Sleep duration component score
      - name: deep_score
        description: Deep sleep component score

  - name: fct_exercise_progress
    description: >
      Exercise progression tracking with personal records.
      Grain: One row per exercise per workout day.
    columns:
      - name: workout_date
        description: Date of workout
        tests:
          - not_null
      - name: exercise_name
        description: Name of exercise
        tests:
          - not_null
      - name: best_weight_kg
        description: Heaviest weight used that session
      - name: total_volume_kg
        description: Total volume for exercise that session
      - name: weight_pr_to_date
        description: All-time weight PR up to this date
      - name: is_weight_pr
        description: True if this session set a weight PR
      - name: session_number
        description: Which session number for this exercise
      - name: total_sessions
        description: Total times exercise has been performed

  - name: fct_strava_activities
    description: >
      Fact table of Strava activities.
      Grain: One row per activity.
    columns:
      - name: activity_id
        description: Primary key
        tests:
          - not_null
          - unique
      - name: activity_date
        description: Calendar date of the activity
        tests:
          - not_null
      - name: activity_name
        description: Activity title from Strava
        tests:
          - not_null
      - name: activity_type
        description: Activity type
        tests:
          - not_null
      - name: started_at_local
        description: Local start timestamp
        tests:
          - not_null

  - name: fct_personal_bests
    description: >
      Competition personal bests aggregated from OpenPowerlifting.
      Grain: One row per athlete.
    columns:
      - name: athlete_name
        description: Athlete name
        tests:
          - not_null
          - unique
      - name: last_competition
        description: Most recent competition date
        tests:
          - not_null
